services:
  mysql:
    image: mysql:8.0
    container_name: dashboard-multipark-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: multipark2024
      MYSQL_DATABASE: dashboard_multipark
      MYSQL_USER: multipark
      MYSQL_PASSWORD: multipark2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
