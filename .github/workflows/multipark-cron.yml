          body="Run falhado: $run_url — $(date -u +'%Y-%m-%d %H:%M UTC')"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "in:title \"$title\"" --json number --jq '.[0].number' || true)
          if [ -n "${existing:-}" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi

  daily-ops:
    if: github.event.schedule == '30 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/cron/daily-ops
        env:
          # URL público de produção; secrets.APP_URL sobrepõe-se se for definido.
          APP_URL: ${{ secrets.APP_URL || 'https://dashbord-multipark.vercel.app' }}
